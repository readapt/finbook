# Telegram Bot 配置
# 从 @BotFather 获取 Bot Token: https://t.me/BotFather

telegram:
  # Bot Token (必填)
  # 获取方式：
  # 1. 打开 Telegram，搜索 @BotFather
  # 2. 发送 /newbot 创建新 Bot
  # 3. 按提示输入 Bot 名称和用户名
  # 4. 复制返回的 Token，填入下方
  bot_token: "${TELEGRAM_BOT_TOKEN}"
  
  # Bot 配置
  bot:
    name: "FinBook 财务助手"
    username: "FinBookBot"
    description: "中小企业开源财务系统"
    about: "基于 OpenClaw 的自托管财务技能包"
  
  # 文件限制
  limits:
    max_file_size_mb: 10
    allowed_mime_types:
      - image/jpeg
      - image/png
      - application/pdf
  
  # Webhook 配置（可选，默认使用轮询）
  webhook:
    enabled: false
    url: ""
    secret_token: ""
  
  # 管理员配置
  admin:
    # Telegram 用户 ID（可选）
    # 留空则第一个使用 Bot 的用户成为管理员
    user_ids: []

# OCR 配置（Telegram 专用）
ocr:
  # 默认 OCR 服务
  default_provider: user_choice  # 让用户自己选择
  
  # 提示语
  messages:
    upload_prompt: "📎 请上传发票图片或 PDF 文件\n\n支持格式：JPEG, PNG, PDF\n最大大小：10MB"
    ocr_choice: "请选择 OCR 服务:\n\n1️⃣ 阿里云 OCR（准确率 98%+）\n2️⃣ 腾讯云 OCR（准确率 98%+）\n3️⃣ 百度 OCR（准确率 97%+）\n4️⃣ 本地 PaddleOCR（免费）"
    processing: "⏳ 正在识别发票..."
    success: "✅ 发票识别成功"
    error: "❌ 识别失败，请重试"
